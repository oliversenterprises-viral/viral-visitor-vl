name: Deploy to GitHub Pages
# cache-bust: 2025-05-21-v3

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Strong cache-bust for GitHub Pages + custom domain (viralrefer.app).
      # Rewrites the script/link src in the emitted index.html so the HTML bytes
      # themselves change on every deploy. Combined with the "remove + re-add
      # custom domain" step in repo Settings → Pages, this finally defeats the
      # stubborn edge cache that has been serving the old monolithic admin.
      - name: Generate build ID and bust HTML cache
        run: |
          BUILD_ID="$(date -u +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"
          echo "BUILD_ID=$BUILD_ID" | tee -a $GITHUB_ENV
          echo "$BUILD_ID" > dist/version.txt
          echo "{\"version\":\"$BUILD_ID\",\"deployed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > dist/version.json

          # Append ?v=BUILD_ID to the hashed JS and CSS so index.html content is unique
          sed -i "s|src=\"\\(/assets/[^\"]*\\.js\\)\"|src=\"\\1?v=${BUILD_ID}\"|g" dist/index.html
          sed -i "s|href=\"\\(/assets/[^\"]*\\.css\\)\"|href=\"\\1?v=${BUILD_ID}\"|g" dist/index.html

          # Add a visible meta tag for debugging
          sed -i "s|</head>|<meta name=\"x-viralrefer-build\" content=\"${BUILD_ID}\"></head>|g" dist/index.html

          echo "Cache-busted index.html with build ID: $BUILD_ID"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
